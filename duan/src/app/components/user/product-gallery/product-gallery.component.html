<div class="product-gallery" *ngIf="images?.length">

  <!-- ẢNH CHÍNH -->
  <div class="main-image">
    <img [src]="selectedImage" />
  </div>

  <!-- THUMB -->
  <div class="thumbnails">
    <img
      *ngFor="let img of images"
      [src]="img.url"
      (click)="changeImage(img.url)"
      [class.active]="selectedImage === img.url"
    />
  </div>

</div>
